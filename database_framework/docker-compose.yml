version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: mulenetx_postgres
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mulenetx -d mulenetx_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata: